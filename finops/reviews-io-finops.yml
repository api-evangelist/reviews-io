meters:
- name: subscription_plan
  description: Recurring monthly or annual subscription fee for the store's plan tier.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
  - domain
- name: review_invitations
  description: Review invitations sent against the plan's monthly allowance.
  unit: invitations
  aggregation: sum
  dimensions:
  - account
  - plan
- name: sms_invitations
  description: SMS review invitations sent as a plan add-on.
  unit: invitations
  aggregation: sum
  dimensions:
  - account
- name: survey_responses
  description: Survey responses collected against the plan's monthly survey allowance.
  unit: responses
  aggregation: sum
  dimensions:
  - account
- name: domains
  description: Number of top-level domains, each requiring its own subscription.
  unit: domains
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track subscription tier, invitation consumption vs. allowance, and add-on usage per store/domain.
- name: Allocation
  description: Map each subscription and domain to the owning brand or business unit.
- name: Optimization
  description: Right-size the plan tier to actual invitation volume; choose annual billing for ~20% savings; consolidate add-ons.
- name: Accountability
  description: Assign an owner per store subscription and review invitation burn against allowance monthly.
