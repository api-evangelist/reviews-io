serviceCategory: Marketing and Customer Experience
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: REVIEWS.io
  ServiceCategory: Marketing and Customer Experience
  ProviderName: REVIEWS.io
