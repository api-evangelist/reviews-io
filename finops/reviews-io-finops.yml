description: >-
  FinOps view of REVIEWS.io spend. REVIEWS.io bills a recurring subscription
  per store tiered by monthly review-invitation allowance, with feature gating
  across Essentials, Start-Up, Grow, Plus, and Enterprise. Annual billing
  discounts the subscription (~20%). Variable cost drivers include SMS
  invitations and survey responses as plan add-ons. Each top-level domain
  requires its own subscription, which is the main multiplier for multi-brand
  spend.
notes: >-
  Subscription prices and invitation tiers reflect the published pricing page
  and may change; verify at reconciliation. SMS and survey add-on rates depend
  on account configuration.
sources:
- https://www.reviews.io/front/pricingplans
- https://developer.reviews.io/reference
- https://focus.finops.org/focus-specification/v1-3/
