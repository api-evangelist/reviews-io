aid: reviews-io
url: https://raw.githubusercontent.com/api-evangelist/reviews-io/refs/heads/main/apis.yml
name: REVIEWS.io
kind: company
description: REVIEWS.io is a product and company reviews and user-generated content
  (UGC) platform that helps brands collect, manage, and display verified customer
  reviews. Its REST API (https://api.reviews.io) lets developers queue review
  invitations, retrieve product and company reviews, fetch ratings and widget data,
  manage questions, and subscribe to webhooks using store + apikey authentication.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Reviews
- UGC
- Ratings
- Reputation
- eCommerce
created: '2026-06-25'
modified: '2026-06-25'
specificationVersion: '0.19'
